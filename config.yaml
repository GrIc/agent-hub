# ── Domain context (optional) ──────────────────────────────
# Business domain knowledge injected into all agent prompts.
# Helps agents understand your product context without hallucinating.

domain:
  sector: ""              # e.g. fintech | healthtech | greentech | ecommerce
  product_type: ""        # e.g. "lending platform", "patient portal"
  target_users: ""        # e.g. "credit analysts, compliance officers"
  description: ""         # Free-form product description (optional)
  key_constraints: []
    # - "GDPR compliance required on all user data"
    # - "Audit trail mandatory for all financial decisions"
  glossary: []
    # - term: "RiskScore"
    #   definition: "Proprietary credit score 0-1000"