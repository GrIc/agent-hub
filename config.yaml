# Grounding settings for codex (per-file documentation generation)
grounding:
  codex_max_tokens: 1500
  codex_max_retries: 3
  codex_temperature_first_attempt: 0.1
  codex_temperature_retry: 0.0
  
  # Synthesis token limits (per level)
  synthesis_L3_aggregate_max_tokens: 800
  synthesis_L2_max_tokens: 800
  synthesis_L1_max_tokens: 600
  synthesis_L0_max_tokens: 400
  synthesis_temperature: 0.1
  synthesis_retry_temperature: 0.0
  synthesis_abstain_threshold: 5  # if >N hallucinated names, abstain

# ── Synthesis blocks (optional) ────────────────────────────
# Customize how synthesize.py classifies codex docs into architectural blocks.
# Default blocks: backend, frontend, database, tests, other.
# Add custom blocks or override path_patterns here.

synthesis:
  condense_threshold: 8000             # chars: above this, condense doc before synthesis
  condense_target: 6000                # target size after condensation
  # Classification blocks: organize docs into architectural layers during synthesis.
  #
  # How it works:
  # - Codex generates L3 docs (one per file) → classified into blocks below
  # - Documents matched against path_patterns (substring match on filepath)
  # - If a doc matches NONE of the patterns, it goes to 'other'
  # - Synthesis then aggregates bottom-up:
  #   * L3: individual file docs
  #   * L2, L1, ..., LN: intermediate aggregations (depth depends on hierarchy)
  #   * L0: single architecture overview (top level)
  # - Level numbering is DYNAMIC: deep hierarchies may reach L11+ before L0
  #
  # Customize for your project:
  # - Add new blocks (e.g., 'database', 'infra')
  # - Edit path_patterns to match your directory structure
  # - Override label/description for clarity
  #
  blocks:
    tests:
      label: "Tests"
      description: "Unit tests, integration tests, test utilities"
      path_patterns:
        - /test/
        - /tests/
        - /__tests__/
        - .test.
        - .spec.
        - _test.
        - _spec.
        - Test.java
        - Spec.js
        - test_
        - tests_
        - /.tst/
        - /.tst_/
        - /_tst_/
        - /test/
        - /tests/
        - Test.java
        - Spec.js
        - .test.
        - .spec.
    database:
      label: "Database"
      description: "SQL scripts, schema definitions, migrations, data model, ORM"
      path_patterns:
        - .sql
        - /migrations/
        - /ddl/
        - /schema/
        - /models/
        - /entities/
        - /repositories/
        - sql_
        - _sql_
        - migration_
        - .mql
        - /reffiles/
        - /MQLFamilies/
        - mql_
        - _mql_
    frontend:
      label: "Frontend"
      description: "JavaScript, TypeScript, HTML, CSS, web components, UI"
      path_patterns:
        - /js/
        - /ts/
        - /css/
        - /html/
        - /webapp/
        - /components/
        - /views/
        - /pages/
        - /layouts/
        - /static/
        - /public/
        - /assets/
        - .js_
        - .ts_
        - .jsx_
        - .tsx_
        - .vue_
        - .html_
        - .css_
        - .scss_
        - .mweb/
        - .mweb_
        - _mweb_
        - /js/
        - /ts/
        - /css/
        - /html/
        - /webapp/
        - .js_
        - .ts_
        - .jsx_
        - .tsx_
        - .vue_
        - .html_
        - .css_
        - .scss_
        - .mweb/
        - .mweb_
        - _mweb_
        - /js/
        - /ts/
        - /css/
        - /html/
    backend:
      label: "Backend"
      description: "Server-side code, business logic, API, services"
      path_patterns:
        - .java
        - .py_
        - .go_
        - .rs_
        - .rb_
        - .php_
        - /src/
        - /lib/
        - /pkg/
        - /internal/
        - /services/
        - /controllers/
        - /handlers/
        - /api/
        - /routes/
        - /middleware/
        - /com/
        - /org/
        - /net/
        - .java
        - .mj/
        - .mj_
        - _mj_
        - /com/
        - /org/
        - /java/
    native:
      label: "Native Apps"
      description: "C/C++, Rust, Swift, Kotlin — desktop and mobile native code"
      path_patterns:
        - .cpp
        - .cc
        - .cxx
        - .c++
        - .hpp
        - .hxx
        - .swift
        - .kt
        - .kts
        - /cpp/
        - /swift/
        - /kotlin/
        - /jni/
    infrastructure:
      label: "Infrastructure"
      description: "IaC, deployment, CI/CD, containerization, orchestration"
      path_patterns:
        - Dockerfile
        - docker-compose
        - .tf
        - .tfvars
        - .yaml
        - .yml
        - Jenkinsfile
        - .gitlab-ci
        - .github/workflows/
        - .circleci/
        - /terraform/
        - /ansible/
        - /kubernetes/
        - /k8s/
        - /helm/
        - /scripts/
        - /deploy/
        - /infra/
        - /devops/
    other:
      label: "Other"
      description: "Configuration, scripts, infrastructure, documentation, misc"
      path_patterns: []
  # Example: add a custom block or override an existing one
  # blocks:
  #   infra:
  #     label: "Infrastructure"
  #     description: "Deployment, CI/CD, Docker, scripts"
  #     path_patterns: ["/infra/", "/deploy/", "/docker/", "Dockerfile"]
  #   database:
