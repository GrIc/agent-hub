# Agent Hub -- CI/CD Pipeline
# Builds Docker image and pushes to your Docker registry.
#
# Required CI/CD Variables (Settings > CI/CD > Variables):
#   REGISTRY_URL      -- Your Docker registry URL (e.g., https://registry.example.com)
#   REGISTRY_USER     -- Registry username (if auth required)
#   REGISTRY_PASSWORD -- Registry password (if auth required)
#
# Optional (for automatic deploy via SSH):
#   DEPLOY_HOST       -- Target machine hostname/IP
#   DEPLOY_USER       -- SSH user on target machine
#   DEPLOY_SSH_KEY_B64 -- Base64-encoded private SSH key
#   DEPLOY_PATH       -- Path on target where the repo is cloned

stages:
  - build
  - deploy

variables:
  DOCKER_IMAGE: ${REGISTRY_URL}/agent-hub:${CI_COMMIT_SHORT_SHA}
  DOCKER_IMAGE_LATEST: ${REGISTRY_URL}/agent-hub:latest

build:
  stage: build
  image: docker:24
  variables:
    DOCKER_HOST: "unix:///var/run/docker.sock"
  before_script:
    - |
      if [ -n "$REGISTRY_USER" ] && [ -n "$REGISTRY_PASSWORD" ]; then
        docker login -u "$REGISTRY_USER" -p "$REGISTRY_PASSWORD" "$REGISTRY_URL"
      fi
  script:
    - docker build -t $DOCKER_IMAGE -t $DOCKER_IMAGE_LATEST .
    - docker push $DOCKER_IMAGE
    - docker push $DOCKER_IMAGE_LATEST
  only:
    - main
    - tags

deploy:
  stage: deploy
  image: alpine:latest
  before_script:
    - apk add --no-cache openssh-client
    - echo "$DEPLOY_SSH_KEY_B64" | base64 -d > /tmp/deploy_key
    - chmod 600 /tmp/deploy_key
  script:
    - |
      ssh -i /tmp/deploy_key -o StrictHostKeyChecking=no \
        "$DEPLOY_USER@$DEPLOY_HOST" << DEPLOY_EOF
        cd $DEPLOY_PATH
        export DOCKER_IMAGE=$DOCKER_IMAGE_LATEST
        docker compose pull
        docker compose up -d
        echo "Deployed $DOCKER_IMAGE_LATEST at \$(date)"
      DEPLOY_EOF
  after_script:
    - rm -f /tmp/deploy_key
  only:
    - main
  when: manual
  allow_failure: true
