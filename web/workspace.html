<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Agent Hub — Workspace</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11.9.0/build/styles/github-dark.min.css">
<script src="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11.9.0/build/highlight.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.min.js"></script>
<script>mermaid.initialize({startOnLoad:false,theme:'dark',themeVariables:{darkMode:true,background:'#1e1f2e',primaryColor:'#7aa2f7',primaryTextColor:'#e0e0e0',lineColor:'#555'}});</script>
<style>
:root{--bg:#0f1117;--bg2:#1a1b26;--bg3:#1e1f2e;--border:#2a2b3a;--text:#e0e0e0;--text2:#888;--accent:#7aa2f7;--accent2:#5a8af7;--green:#7adf7a;--red:#ff6b6b;--yellow:#e0af68;--magenta:#bb9af7;--sidebar-w:260px;--preview-w:420px;--font:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;--mono:'JetBrains Mono','Fira Code','Consolas',monospace;}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:var(--font);background:var(--bg);color:var(--text);height:100vh;display:flex;flex-direction:column;overflow:hidden;}
.header{background:var(--bg2);border-bottom:1px solid var(--border);padding:8px 16px;display:flex;align-items:center;gap:12px;flex-shrink:0;z-index:100;}
.header h1{font-size:16px;color:var(--accent);white-space:nowrap;}
.header-group{display:flex;align-items:center;gap:8px;}
.hdr-select{padding:4px 8px;border-radius:6px;border:1px solid var(--border);background:var(--bg2);color:var(--text);font-size:13px;}
.hdr-btn{padding:4px 10px;border-radius:6px;border:1px solid var(--border);background:transparent;color:var(--text2);font-size:12px;cursor:pointer;}
.hdr-btn:hover{border-color:var(--accent);color:var(--accent);}
.hdr-btn.danger:hover{border-color:var(--red);color:var(--red);}
.hdr-sep{width:1px;height:24px;background:var(--border);}
.hdr-label{font-size:11px;color:var(--text2);text-transform:uppercase;letter-spacing:.5px;}
.spacer{flex:1;}
.pipeline-bar{display:none;background:var(--bg3);border-bottom:1px solid var(--border);padding:6px 16px;font-size:12px;align-items:center;gap:8px;flex-shrink:0;}
.pipeline-bar.visible{display:flex;}
.pipeline-steps{display:flex;gap:4px;align-items:center;}
.pipe-step{padding:2px 8px;border-radius:4px;background:var(--bg2);color:var(--text2);}
.pipe-step.active{background:var(--accent);color:var(--bg);font-weight:600;}
.pipe-step.done{background:#1a3a1a;color:var(--green);}
.pipe-arrow{color:var(--text2);font-size:10px;}
.pipe-actions{margin-left:auto;display:flex;gap:6px;}
.main{display:flex;flex:1;overflow:hidden;}
.sidebar-left{width:var(--sidebar-w);background:var(--bg2);border-right:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0;transition:width .2s,opacity .2s;overflow:hidden;}
.sidebar-left.collapsed{width:0;opacity:0;pointer-events:none;}
.sidebar-header{padding:8px 12px;border-bottom:1px solid var(--border);font-size:12px;color:var(--text2);display:flex;justify-content:space-between;align-items:center;}
.file-tree{flex:1;overflow-y:auto;padding:4px 0;font-size:13px;}
.tree-node{cursor:pointer;user-select:none;}
.tree-dir{padding:3px 8px;display:flex;align-items:center;gap:4px;color:var(--text2);}
.tree-dir:hover{background:var(--bg3);}
.tree-dir .arrow{font-size:10px;width:12px;display:inline-block;transition:transform .15s;}
.tree-dir .arrow.open{transform:rotate(90deg);}
.tree-file{padding:3px 8px 3px 28px;display:flex;align-items:center;gap:6px;color:var(--text);}
.tree-file:hover{background:var(--bg3);}
.tree-file.loaded{background:#1a2a3a;border-left:2px solid var(--accent);}
.tree-file.viewing{color:var(--accent);font-weight:500;}
.tree-children{display:none;}
.tree-children.open{display:block;}
.tree-icon{font-size:11px;}
.load-btn{font-size:10px;padding:1px 5px;border-radius:3px;border:1px solid var(--border);background:transparent;color:var(--text2);cursor:pointer;margin-left:auto;display:none;}
.tree-file:hover .load-btn{display:inline-block;}
.load-btn:hover{border-color:var(--accent);color:var(--accent);}
.load-btn.is-loaded{display:inline-block;border-color:var(--green);color:var(--green);}
.center{flex:1;display:flex;flex-direction:column;min-width:0;}
.agent-bar{padding:6px 16px;background:var(--bg2);border-bottom:1px solid var(--border);font-size:12px;color:var(--text2);display:flex;align-items:center;gap:8px;}
.agent-badge{padding:2px 8px;border-radius:4px;background:var(--bg3);color:var(--accent);font-weight:500;}
.chat-area{flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:12px;}
.msg{padding:12px 16px;border-radius:10px;max-width:90%;line-height:1.55;word-wrap:break-word;}
.msg.user{background:#1a3a5c;align-self:flex-end;border-bottom-right-radius:4px;white-space:pre-wrap;}
.msg.assistant{background:var(--bg2);border:1px solid var(--border);align-self:flex-start;border-bottom-left-radius:4px;}
.msg.system{background:#1a2a1a;border:1px solid #2a3a2a;color:var(--green);font-size:12px;align-self:center;white-space:pre-wrap;max-width:95%;}
.msg.error{background:#3a1a1a;border:1px solid #5a2a2a;color:var(--red);white-space:pre-wrap;}
.msg .duration{font-size:10px;color:var(--text2);margin-top:4px;}
.msg h2,.msg h3,.msg h4{margin:10px 0 4px;color:#c0caf5;} .msg h2{font-size:16px;} .msg h3{font-size:14px;} .msg h4{font-size:13px;}
.msg li{margin-left:18px;margin-bottom:2px;} .msg strong{color:#c0caf5;}
.msg code{background:var(--bg3);padding:1px 5px;border-radius:3px;font-size:12px;font-family:var(--mono);}
.code-block-wrapper{margin:6px 0;border-radius:6px;overflow:hidden;background:var(--bg3);}
.code-header{display:flex;justify-content:space-between;align-items:center;padding:4px 10px;background:#161722;border-bottom:1px solid var(--border);font-size:11px;}
.code-lang{color:var(--accent);font-family:var(--mono);text-transform:uppercase;}
.copy-btn{color:var(--text2);background:transparent;border:1px solid var(--border);border-radius:3px;padding:1px 6px;cursor:pointer;font-size:10px;}
.copy-btn:hover{color:var(--text);border-color:var(--accent);}
pre{margin:0;overflow-x:auto;}
pre code{background:none!important;padding:10px;display:block;font-size:12px;line-height:1.45;font-family:var(--mono);border-radius:0;}
.mermaid-container{background:var(--bg3);border-radius:6px;padding:12px;margin:6px 0;overflow-x:auto;}
.typing{color:var(--accent);font-style:italic;}
.input-bar{display:flex;gap:8px;padding:12px 16px;border-top:1px solid var(--border);background:var(--bg2);}
.input-bar textarea{flex:1;padding:10px 14px;border-radius:8px;border:1px solid var(--border);background:var(--bg);color:var(--text);font-size:14px;font-family:var(--font);outline:none;resize:none;min-height:42px;max-height:120px;}
.input-bar textarea:focus{border-color:var(--accent);}
.input-bar button{padding:10px 20px;border-radius:8px;border:none;background:var(--accent);color:var(--bg);font-size:14px;font-weight:600;cursor:pointer;}
.input-bar button:hover{background:var(--accent2);}
.input-bar button:disabled{background:#333;color:#666;cursor:wait;}
.sidebar-right{width:var(--preview-w);background:var(--bg2);border-left:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0;transition:width .2s,opacity .2s;overflow:hidden;}
.sidebar-right.collapsed{width:0;opacity:0;pointer-events:none;}
.preview-header{padding:8px 12px;border-bottom:1px solid var(--border);font-size:12px;color:var(--text2);display:flex;justify-content:space-between;align-items:center;}
.preview-content{flex:1;overflow-y:auto;padding:16px;font-size:13px;line-height:1.6;}
.preview-content h1{font-size:20px;margin:16px 0 8px;color:#c0caf5;}
.preview-content h2{font-size:17px;margin:14px 0 6px;color:#c0caf5;}
.preview-content h3{font-size:15px;margin:12px 0 4px;color:#c0caf5;}
.preview-content code{background:var(--bg3);padding:1px 5px;border-radius:3px;font-family:var(--mono);font-size:12px;}
.preview-content pre{background:var(--bg3);border-radius:6px;padding:12px;overflow-x:auto;margin:8px 0;}
.preview-content pre code{background:none;padding:0;display:block;font-size:12px;line-height:1.45;}
.preview-content li{margin-left:18px;margin-bottom:4px;}
.preview-empty{color:var(--text2);text-align:center;margin-top:40px;font-size:13px;}
::-webkit-scrollbar{width:6px;}::-webkit-scrollbar-track{background:transparent;}::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px;}
</style>
</head>
<body>
<div class="header">
  <h1>⚡ Workspace</h1><div class="hdr-sep"></div>
  <div class="header-group"><span class="hdr-label">Project</span><select id="project-select" class="hdr-select" onchange="onProjectChange()"><option value="">-- select --</option></select><button class="hdr-btn" onclick="createProject()">+ New</button></div>
  <div class="hdr-sep"></div>
  <div class="header-group"><span class="hdr-label">Agent</span><select id="agent-select" class="hdr-select" onchange="onAgentChange()"></select></div>
  <div class="hdr-sep"></div>
  <div class="header-group"><button class="hdr-btn" onclick="startPipeline()">▶ Pipeline</button><button class="hdr-btn" onclick="sendCmd('/save')">💾 Save</button><button class="hdr-btn" onclick="sendCmd('/help')">❓ Help</button></div>
  <div class="spacer"></div>
  <div class="header-group"><button class="hdr-btn" onclick="toggleLeft()">📁</button><button class="hdr-btn" onclick="toggleRight()">📄</button><button class="hdr-btn danger" onclick="clearChat()">Clear</button><a href="/" class="hdr-btn" style="text-decoration:none;">← Expert</a><a href="/docs" class="hdr-btn" style="text-decoration:none;">📚 Docs</a></div>
</div>
<div class="pipeline-bar" id="pipeline-bar"><span style="color:var(--magenta);font-weight:600;">PIPELINE</span><div class="pipeline-steps" id="pipeline-steps"></div><div class="pipe-actions"><button class="hdr-btn" onclick="pipelineFinalize()">✅ Finalize</button><button class="hdr-btn" onclick="pipelineSkip()">⏭ Skip</button><button class="hdr-btn danger" onclick="pipelineAbort()">✖ Abort</button></div></div>
<div class="main">
  <div class="sidebar-left" id="sidebar-left"><div class="sidebar-header"><span>📁 Project files</span><button class="hdr-btn" onclick="refreshFiles()" style="font-size:11px;">↻</button></div><div class="file-tree" id="file-tree"><div class="preview-empty" style="margin-top:20px;">Select a project</div></div></div>
  <div class="center"><div class="agent-bar"><span id="agent-badge" class="agent-badge">No agent</span><span id="agent-desc-bar" style="color:var(--text2);"></span></div><div class="chat-area" id="chat"></div><div class="input-bar"><textarea id="input" placeholder="Type a message or /command..." rows="1"></textarea><button id="send-btn" onclick="send()">Send</button></div></div>
  <div class="sidebar-right collapsed" id="sidebar-right"><div class="preview-header"><span id="preview-title">Preview</span><button class="hdr-btn" onclick="closePreview()" style="font-size:11px;">✕</button></div><div class="preview-content" id="preview"><div class="preview-empty">Click a file to preview,<br>or an agent will show output here.</div></div></div>
</div>
<script>
let sessionId=localStorage.getItem('ws_session')||Math.random().toString(36).slice(2,14);
localStorage.setItem('ws_session',sessionId);
let currentProject='',currentAgent='',agents={},pipelineActive=false,pipelineStepIdx=0,loadedFiles=new Set();
const chat=document.getElementById('chat'),inputEl=document.getElementById('input'),sendBtn=document.getElementById('send-btn');
inputEl.addEventListener('input',function(){inputEl.style.height='auto';inputEl.style.height=Math.min(inputEl.scrollHeight,120)+'px';});
inputEl.addEventListener('keydown',function(e){if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();send();}});

async function api(method,url,body){var o={method:method,headers:{'Content-Type':'application/json'}};if(body)o.body=JSON.stringify(body);var r=await fetch(url,o);var d=await r.json();if(!r.ok&&d.error)throw new Error(d.error);return d;}

/* ══ Markdown renderer — placeholder-based to protect code/mermaid blocks ══ */
function esc(t){return t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function copyCode(btn){var w=btn.closest('.code-block-wrapper');var c=w&&w.querySelector('code');if(c)navigator.clipboard.writeText(c.textContent).then(function(){btn.textContent='Copied!';setTimeout(function(){btn.textContent='Copy';},2000);});}

function renderMd(c){
    var blocks=[];
    function stash(html){blocks.push(html);return '\x00BLOCK'+(blocks.length-1)+'\x00';}
    var s=c
        .replace(/```mermaid\n([\s\S]*?)```/g,function(m,code){
            return stash('<div class="mermaid-container"><pre class="mermaid">'+code+'</pre></div>');
        })
        .replace(/```(\w*)\n([\s\S]*?)```/g,function(m,lang,code){
            var la=lang||'text',e=esc(code.trimEnd());
            return stash('<div class="code-block-wrapper"><div class="code-header"><span class="code-lang">'+la+'</span><button class="copy-btn" onclick="copyCode(this)">Copy</button></div><pre><code class="language-'+la+'">'+e+'</code></pre></div>');
        });
    s=s.replace(/`([^`]+)`/g,'<code>$1</code>')
       .replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>')
       .replace(/^### (.+)$/gm,'<h4>$1</h4>')
       .replace(/^## (.+)$/gm,'<h3>$1</h3>')
       .replace(/^# (.+)$/gm,'<h2>$1</h2>')
       .replace(/^- (.+)$/gm,'<li>$1</li>')
       .replace(/\n\n/g,'<br><br>')
       .replace(/\n/g,'<br>');
    s=s.replace(/\x00BLOCK(\d+)\x00/g,function(m,i){return blocks[parseInt(i)];});
    return s;
}

async function init(){
  await loadProjects();await loadAgents();
  try{var r=await api('POST','/api/ws/session',{session_id:sessionId});
    if(r.project){currentProject=r.project;document.getElementById('project-select').value=currentProject;await refreshFiles();}
    if(r.agent){currentAgent=r.agent;document.getElementById('agent-select').value=currentAgent;updateAgentBar();}
    if(r.pipeline&&r.pipeline.active){pipelineActive=true;pipelineStepIdx=r.pipeline.step_idx;showPipelineBar();}
  }catch(e){}
  addSystem('Welcome to the Workspace!\nSelect a project and agent to start. Use /commands just like the CLI.\n\nQuick start:\n  1. Select or create a project\n  2. Choose an agent (or click ▶ Pipeline)\n  3. Use /load to load project files, then chat\n  4. Use /draft, /finalize, /save as needed');
}

async function loadProjects(){var d=await api('GET','/api/ws/projects');var s=document.getElementById('project-select');s.innerHTML='<option value="">-- select --</option>';for(var i=0;i<d.projects.length;i++){var o=document.createElement('option');o.value=d.projects[i];o.textContent=d.projects[i];s.appendChild(o);}}
async function onProjectChange(){var n=document.getElementById('project-select').value;if(!n)return;await api('POST','/api/ws/set-project',{session_id:sessionId,project:n});currentProject=n;loadedFiles.clear();addSystem('Project set: '+n);await refreshFiles();}
async function createProject(){var n=prompt('New project name:');if(!n||!n.trim())return;await api('POST','/api/ws/projects',{name:n.trim()});await loadProjects();document.getElementById('project-select').value=n.trim();await onProjectChange();}

async function refreshFiles(){if(!currentProject)return;var t=document.getElementById('file-tree');try{var d=await api('GET','/api/ws/projects/'+currentProject+'/files');t.innerHTML='';for(var i=0;i<d.tree.length;i++)t.appendChild(buildTreeNode(d.tree[i]));}catch(e){t.innerHTML='<div class="preview-empty">'+e.message+'</div>';}}
function buildTreeNode(node){var el=document.createElement('div');el.className='tree-node';
  if(node.type==='dir'){var dir=document.createElement('div');dir.className='tree-dir';dir.innerHTML='<span class="arrow">▶</span><span class="tree-icon">📁</span> '+node.name;var ch=document.createElement('div');ch.className='tree-children';dir.onclick=function(){ch.classList.toggle('open');dir.querySelector('.arrow').classList.toggle('open');};for(var i=0;i<(node.children||[]).length;i++)ch.appendChild(buildTreeNode(node.children[i]));el.appendChild(dir);el.appendChild(ch);}
  else{var f=document.createElement('div');f.className='tree-file';f.dataset.path=node.path;var ico=node.name.endsWith('.md')?'📝':'📄';f.innerHTML='<span class="tree-icon">'+ico+'</span><span>'+node.name+'</span>';
    var lb=document.createElement('button');lb.className='load-btn'+(loadedFiles.has(node.path)?' is-loaded':'');lb.textContent=loadedFiles.has(node.path)?'✓':'load';lb.onclick=function(e){e.stopPropagation();loadFileForAgent(node.path,lb);};f.appendChild(lb);
    f.onclick=function(){previewFile(node.path,node.name);};el.appendChild(f);}
  return el;}
async function previewFile(path,name){try{var d=await api('GET','/api/ws/projects/'+currentProject+'/file?path='+encodeURIComponent(path));showPreview(name,d.content);document.querySelectorAll('.tree-file.viewing').forEach(function(e){e.classList.remove('viewing');});var el=document.querySelector('.tree-file[data-path="'+path+'"]');if(el)el.classList.add('viewing');}catch(e){showPreview(name,'Error: '+e.message);}}
async function loadFileForAgent(path,btn){addSystem('Loading '+path+'...');var r=await api('POST','/api/ws/chat',{session_id:sessionId,message:'/load'});if(r.answer)addAssistant(r.answer,r.duration_ms);loadedFiles.add(path);btn.textContent='✓';btn.classList.add('is-loaded');refreshFiles();}

async function loadAgents(){agents=await api('GET','/api/ws/agents');var s=document.getElementById('agent-select');s.innerHTML='';for(var n in agents){var o=document.createElement('option');o.value=n;o.textContent=agents[n].emoji+' '+n;s.appendChild(o);}}
async function onAgentChange(){var n=document.getElementById('agent-select').value;if(!n)return;try{var r=await api('POST','/api/ws/switch-agent',{session_id:sessionId,agent:n});if(r.error){addSystem('Error: '+r.error);return;}currentAgent=n;loadedFiles.clear();updateAgentBar();addSystem('Switched to '+(agents[n]?agents[n].emoji:'')+' '+n);}catch(e){addSystem('Error: '+e.message);}}
function updateAgentBar(){var i=agents[currentAgent];document.getElementById('agent-badge').textContent=(i?i.emoji:'🤖')+' '+currentAgent;document.getElementById('agent-desc-bar').textContent=i?i.desc:'';}

async function send(){var msg=inputEl.value.trim();if(!msg)return;inputEl.value='';inputEl.style.height='auto';sendBtn.disabled=true;addUser(msg);var typ=addTyping();try{var r=await api('POST','/api/ws/chat',{session_id:sessionId,message:msg});removeTyping(typ);if(r.error)addError(r.error);else{addAssistant(r.answer,r.duration_ms);handleMeta(r);}}catch(e){removeTyping(typ);addError(e.message);}sendBtn.disabled=false;inputEl.focus();}
async function sendCmd(cmd){if(!currentAgent){addSystem('Select an agent first.');return;}inputEl.value=cmd;await send();}
function handleMeta(r){if(r.files_generated&&r.files_generated.length>0)setTimeout(refreshFiles,500);if(r.latest_output){var lo=r.latest_output;previewFile(lo.path,lo.doc_type+' v'+lo.version);setTimeout(refreshFiles,500);}if(r.state&&r.state.pipeline&&r.state.pipeline.active){pipelineActive=true;pipelineStepIdx=r.state.pipeline.step_idx;showPipelineBar();}}

async function startPipeline(){if(!currentProject){addSystem('Select a project first.');return;}try{var r=await api('POST','/api/ws/pipeline/start',{session_id:sessionId});if(r.error){addSystem('Error: '+r.error);return;}pipelineActive=true;pipelineStepIdx=r.step_idx;currentAgent=r.agent;document.getElementById('agent-select').value=currentAgent;updateAgentBar();showPipelineBar();addSystem('Pipeline started! Step '+(r.step_idx+1)+'/'+r.total_steps+': '+r.step.label+'\nAgent: '+r.agent+'\n\nUse /load to load notes, then chat.\nClick ✅ Finalize when ready for next step.');}catch(e){addSystem('Error: '+e.message);}}
async function pipelineFinalize(){await sendCmd('/finalize');try{var r=await api('POST','/api/ws/pipeline/next',{session_id:sessionId});if(r.status==='complete'){pipelineActive=false;hidePipelineBar();addSystem('🎉 Pipeline complete!');await refreshFiles();return;}pipelineStepIdx=r.step_idx;currentAgent=r.agent;document.getElementById('agent-select').value=currentAgent;updateAgentBar();showPipelineBar();addSystem('Step '+(r.step_idx+1)+'/'+r.total_steps+': '+r.step.label+'\nAgent: '+r.agent);await refreshFiles();}catch(e){addSystem('Error: '+e.message);}}
async function pipelineSkip(){try{var r=await api('POST','/api/ws/pipeline/skip',{session_id:sessionId});if(r.status==='complete'){pipelineActive=false;hidePipelineBar();addSystem('Pipeline complete!');return;}pipelineStepIdx=r.step_idx;currentAgent=r.agent;document.getElementById('agent-select').value=currentAgent;updateAgentBar();showPipelineBar();addSystem('Skipped. Step '+(r.step_idx+1)+'/'+r.total_steps+': '+r.step.label);}catch(e){addSystem('Error: '+e.message);}}
async function pipelineAbort(){await api('POST','/api/ws/pipeline/abort',{session_id:sessionId});pipelineActive=false;hidePipelineBar();addSystem('Pipeline aborted.');}
var STEPS=['Requirements','Specifications','Roadmap','Synthesis','Presentation','Implementation'];
function showPipelineBar(){var b=document.getElementById('pipeline-bar');b.classList.add('visible');var s=document.getElementById('pipeline-steps');s.innerHTML='';STEPS.forEach(function(l,i){if(i>0){var a=document.createElement('span');a.className='pipe-arrow';a.textContent='→';s.appendChild(a);}var d=document.createElement('span');d.className='pipe-step'+(i===pipelineStepIdx?' active':'')+(i<pipelineStepIdx?' done':'');d.textContent=l;s.appendChild(d);});}
function hidePipelineBar(){document.getElementById('pipeline-bar').classList.remove('visible');}

function showPreview(title,content){document.getElementById('preview-title').textContent=title;var el=document.getElementById('preview');el.innerHTML=renderMd(content);el.querySelectorAll('pre code').forEach(function(b){try{hljs.highlightElement(b);}catch(e){}});try{mermaid.run({nodes:el.querySelectorAll('.mermaid')});}catch(e){}document.getElementById('sidebar-right').classList.remove('collapsed');}
function closePreview(){document.getElementById('sidebar-right').classList.add('collapsed');}
function toggleLeft(){document.getElementById('sidebar-left').classList.toggle('collapsed');}
function toggleRight(){document.getElementById('sidebar-right').classList.toggle('collapsed');}

function addUser(t){var d=mk('msg user');d.textContent=t;chat.appendChild(d);sc();}
function addAssistant(t,ms){var d=mk('msg assistant');d.innerHTML=renderMd(t);d.querySelectorAll('pre code').forEach(function(b){try{hljs.highlightElement(b);}catch(e){}});if(ms){var dur=mk('duration');dur.textContent=(ms/1000).toFixed(1)+'s';d.appendChild(dur);}chat.appendChild(d);sc();try{mermaid.run({nodes:d.querySelectorAll('.mermaid')});}catch(e){}}
function addSystem(t){var d=mk('msg system');d.textContent=t;chat.appendChild(d);sc();}
function addError(t){var d=mk('msg error');d.textContent=t;chat.appendChild(d);sc();}
function addTyping(){var d=mk('msg assistant typing');d.textContent='Thinking...';chat.appendChild(d);sc();return d;}
function removeTyping(el){if(el&&el.parentNode)el.parentNode.removeChild(el);}
function clearChat(){chat.innerHTML='';addSystem('Chat cleared.');}
function mk(c){var d=document.createElement('div');d.className=c;return d;}
function sc(){chat.scrollTop=chat.scrollHeight;}

init();
</script>
</body>
</html>
